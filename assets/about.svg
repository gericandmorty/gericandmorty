<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="780" height="460" rx="12" fill="#0d1117" filter="url(#shadow)" />
  
  <path d="M 10 22 Q 10 10 22 10 L 778 10 Q 790 10 790 22 L 790 50 L 10 50 Z" fill="url(#header_grad)" />
  
  <!-- Window Controls -->
  <circle cx="35" cy="30" r="6" fill="#ff5f56" />
  <circle cx="55" cy="30" r="6" fill="#ffbd2e" />
  <circle cx="75" cy="30" r="6" fill="#27c93f" />

  <!-- Tab -->
  <path d="M 100 15 L 220 15 L 230 50 L 90 50 Z" fill="#0d1117" />
  <text x="135" y="35" font-family="monospace" font-size="14" fill="#c9d1d9">AboutMe.ts</text>
  <circle cx="120" cy="30" r="4" fill="#3178c6" /> <!-- TS Icon color -->

  <!-- Code Section -->
  <g font-family="monospace" font-size="16" transform="translate(40, 90)">
    <text y="0">
      <tspan fill="#ff79c6">interface</tspan> <tspan fill="#8be9fd">Developer</tspan> {
    </text>
    <text y="30">
      <tspan fill="#f8f8f2">  status: string;</tspan>
    </text>
    <text y="60">
      <tspan fill="#f8f8f2">  location: string;</tspan>
    </text>
    <text y="90">
      <tspan fill="#f8f8f2">  expertise: string[];</tspan>
    </text>
    <text y="120">
      <tspan fill="#f8f8f2">  hobbies: string[];</tspan>
    </text>
    <text y="150">
      <tspan fill="#f8f8f2">}</tspan>
    </text>
    <text y="190">
      <tspan fill="#ff79c6">const</tspan> <tspan fill="#8be9fd">Geric</tspan>: <tspan fill="#8be9fd">Developer</tspan> = {
    </text>
    <text y="220">
      <tspan fill="#f8f8f2">  status:</tspan> <tspan fill="#f1fa8c">"sleeping, coding, probably day dreaming?"</tspan>,
    </text>
    <text y="250">
      <tspan fill="#f8f8f2">  location:</tspan> <tspan fill="#f1fa8c">"Philippines / Manila"</tspan>,
    </text>
    <text y="280">
      <tspan fill="#f8f8f2">  expertise:</tspan> [
    </text>
    <text y="310">
      <tspan fill="#f1fa8c">    "Database Management"</tspan>, <tspan fill="#f1fa8c">"Backend"</tspan>, <tspan fill="#f1fa8c">"Frontend"</tspan>
    </text>
    <text y="335" font-style="italic" fill="#6272a4">    // a little bit of that a little bit of that</text>
    <text y="360">
      <tspan fill="#f8f8f2">  ],</tspan>
    </text>
    <text y="390">
      <tspan fill="#f8f8f2">  hobbies:</tspan> [
    </text>
    <text y="420">
      <tspan fill="#f1fa8c">    "sleeping?"</tspan>
    </text>
    <text y="450">
      <tspan fill="#f8f8f2">  ]</tspan>
    </text>
    <text y="480">
      <tspan fill="#f8f8f2">};</tspan>
    </text>
  </g>
</svg>
