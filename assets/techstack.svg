<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect x="20" y="20" width="760" height="560" rx="15" fill="#0d1117" filter="url(#shadow)" />
  
  <!-- Header Bar -->
  <path d="M 20 35 Q 20 20 35 20 L 765 20 Q 780 20 780 35 L 780 70 L 20 70 Z" fill="url(#header_grad)" />
  
  <!-- Window Controls -->
  <circle cx="50" cy="45" r="8" fill="#ff5f56" />
  <circle cx="75" cy="45" r="8" fill="#ffbd2e" />
  <circle cx="100" cy="45" r="8" fill="#27c93f" />

  <!-- Tab -->
  <path d="M 130 25 L 260 25 L 275 70 L 115 70 Z" fill="#0d1117" />
  <text x="165" y="52" font-family="monospace" font-size="16" fill="#c9d1d9">Stack.ts</text>
  <circle cx="152" cy="46" r="4.5" fill="#3178c6" />

  <!-- Code Section - Improved Spacing (Line height: 35px) -->
  <g font-family="monospace" font-size="18" transform="translate(60, 110)">
    <text y="0">
      <tspan fill="#ff79c6">const</tspan> <tspan fill="#8be9fd">stack</tspan>: <tspan fill="#8be9fd">string</tspan>[] = [
    </text>
    <text y="35">
      <tspan fill="#f1fa8c">  "TypeScript"</tspan>,
    </text>
    <text y="70">
      <tspan fill="#f1fa8c">  "React"</tspan>, <tspan fill="#f1fa8c">"Node"</tspan>,
    </text>
    <text y="105">
      <tspan fill="#f1fa8c">  "SQL"</tspan>, <tspan fill="#f1fa8c">"Next.js"</tspan>,
    </text>
    <text y="140">
      <tspan fill="#f1fa8c">  "AI Integration"</tspan>,
    </text>
    <text y="175">
      <tspan fill="#f1fa8c">  "Automation"</tspan>
    </text>
    <text y="210">
      <tspan fill="#f8f8f2">];</tspan>
    </text>

    <!-- Comments -->
    <text y="300" font-style="italic" fill="#6272a4">// Continuous learning mode</text>
    <text y="335" font-style="italic" fill="#6272a4">// Exploring advanced LLMs</text>
  </g>
</svg>
