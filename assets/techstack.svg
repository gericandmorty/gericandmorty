<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="780" height="480" rx="12" fill="#0d1117" filter="url(#shadow)" />
  
  <path d="M 10 22 Q 10 10 22 10 L 778 10 Q 790 10 790 22 L 790 50 L 10 50 Z" fill="url(#header_grad)" />
  
  <!-- Window Controls -->
  <circle cx="35" cy="30" r="6" fill="#ff5f56" />
  <circle cx="55" cy="30" r="6" fill="#ffbd2e" />
  <circle cx="75" cy="30" r="6" fill="#27c93f" />

  <!-- Tab (Widened to fix overlap) -->
  <path d="M 100 15 L 250 15 L 260 50 L 90 50 Z" fill="#0d1117" />
  <text x="135" y="35" font-family="monospace" font-size="14" fill="#c9d1d9">TechStack.ts</text>
  <circle cx="120" cy="30" r="4" fill="#3178c6" /> <!-- TS Icon color -->

  <!-- Code Section -->
  <g font-family="monospace" font-size="16" transform="translate(40, 90)">
    <text y="0">
      <tspan fill="#ff79c6">const</tspan> <tspan fill="#8be9fd">techStack</tspan>: <tspan fill="#8be9fd">string</tspan>[] = [
    </text>
    <text y="30">
      <tspan fill="#f1fa8c">  "TypeScript"</tspan>, <tspan fill="#f1fa8c">"JavaScript"</tspan>, <tspan fill="#f1fa8c">"React"</tspan>,
    </text>
    <text y="60">
      <tspan fill="#f1fa8c">  "Next.js"</tspan>, <tspan fill="#f1fa8c">"Node.js"</tspan>, <tspan fill="#f1fa8c">"Express"</tspan>,
    </text>
    <text y="90">
      <tspan fill="#f1fa8c">  "PostgreSQL"</tspan>, <tspan fill="#f1fa8c">"TailwindCSS"</tspan>, <tspan fill="#f1fa8c">"Git"</tspan>,
    </text>
    <text y="120">
      <tspan fill="#f1fa8c">  "Python"</tspan>, <tspan fill="#f1fa8c">"AI Integration"</tspan>, <tspan fill="#f1fa8c">"OpenSource"</tspan>
    </text>
    <text y="150">
      <tspan fill="#f8f8f2">];</tspan>
    </text>

    <!-- Additional Commented Out Info -->
    <text y="210" font-style="italic" fill="#6272a4">// Continuous learning mode active</text>
    <text y="240" font-style="italic" fill="#6272a4">// Exploring advanced LLM architectures</text>
  </g>
</svg>
