<svg xmlns="http://www.w3.org/2000/svg" width="800" height="20" viewBox="0 0 800 20">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="25%" stop-color="#FF00FF" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="75%" stop-color="#FF00FF" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="scanGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main scanline -->
  <line x1="50" y1="10" x2="750" y2="10" stroke="url(#neonGrad)" stroke-width="2" filter="url(#scanGlow)" />
  <!-- Pixel dots -->
  <rect x="48" y="8" width="4" height="4" fill="#00FFFF" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <rect x="748" y="8" width="4" height="4" fill="#00FFFF" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <!-- Center diamond -->
  <polygon points="400,4 406,10 400,16 394,10" fill="#FFD700" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
  </polygon>
</svg>
