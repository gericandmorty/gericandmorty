<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main Frame Bottom -->
  <path d="M 10 0 L 10 20 Q 10 30 20 30 L 780 30 Q 790 30 790 20 L 790 0" fill="none" stroke="#3b82f6" stroke-width="4" filter="url(#glow)">
    <animate attributeName="stroke" values="#3b82f6;#00FFFF;#3b82f6" dur="3s" repeatCount="indefinite" />
  </path>
  <!-- Centered "INSERT COIN" style light -->
  <rect x="350" y="25" width="100" height="10" rx="5" fill="#EF4444" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1s" repeatCount="indefinite" />
  </rect>
  <text x="400" y="33" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">STAGE 01</text>
</svg>
