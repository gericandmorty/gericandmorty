<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background and Window Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="100%" stop-color="#121824" />
    </linearGradient>
    <linearGradient id="chrome-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="35%" stop-color="#c084fc" />
      <stop offset="70%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip Paths for Typing Animations -->
    <clipPath id="clip-cmd">
      <rect id="rect-cmd" x="262" y="55" width="0" height="35" />
    </clipPath>
    <clipPath id="clip-brand">
      <rect id="rect-brand" x="75" y="195" width="0" height="60" />
    </clipPath>

    <!-- Grid Pattern Definition -->
    <pattern id="grid-pattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');
    
    .term-window {
      fill: url(#bg-grad);
      stroke: #334155;
      stroke-width: 1.5;
      rx: 12px;
      filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.65));
    }
    .term-header {
      fill: url(#chrome-grad);
      stroke: #334155;
      stroke-width: 1.5;
    }
    .text-base {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      fill: #f1f5f9;
    }
    
    /* Terminal Prompt Colors */
    .prompt-user {
      fill: #34d399;
      font-weight: 600;
    }
    .prompt-host {
      fill: #38bdf8;
    }
    .prompt-char {
      fill: #cbd5e1;
    }
    
    /* Command Syntax Highlighting */
    .cmd-sudo { fill: #f87171; font-weight: 600; }
    .cmd-rm { fill: #fbbf24; }
    .cmd-dest { fill: #e2e8f0; }

    /* Blinking Cursor Definition */
    .cursor-rect {
      fill: #cbd5e1;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Grid Overlay Pattern */
    .grid-overlay {
      opacity: 0.05;
      fill: url(#grid-pattern);
    }

    /* --- TIMELINE ANIMATIONS (10s Loop) --- */

    /* Phase 1: Prompt & Typing "sudo rm -rf /" */
    .initial-prompt {
      animation: stage-1 10s infinite step-end;
    }
    @keyframes stage-1 {
      0%, 34% { opacity: 1; visibility: visible; }
      34.01%, 100% { opacity: 0; visibility: hidden; }
    }

    #rect-cmd {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      width: 0ch;
      animation: type-cmd 10s infinite linear;
    }
    @keyframes type-cmd {
      0%, 10% { width: 0ch; }
      25%, 34% { width: 13ch; }
      34.01%, 100% { width: 0ch; }
    }

    .cursor-cmd {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      animation: move-cursor-cmd 10s infinite linear, blink 0.8s infinite;
    }
    @keyframes move-cursor-cmd {
      0%, 10% { transform: translateX(0ch); opacity: 1; }
      25%, 34% { transform: translateX(13ch); opacity: 1; }
      34.01%, 100% { opacity: 0; }
    }

    /* Phase 2: Execution Flash */
    .flash-overlay {
      fill: #38bdf8;
      opacity: 0;
      animation: flash-screen 10s infinite ease-out;
    }
    @keyframes flash-screen {
      0%, 32% { opacity: 0; }
      33% { opacity: 0.85; }
      35%, 100% { opacity: 0; }
    }

    /* Phase 3: Reboot and System Logs */
    .reboot-log {
      animation: stage-2 10s infinite step-end;
    }
    @keyframes stage-2 {
      0%, 34% { opacity: 0; visibility: hidden; }
      34.01%, 90% { opacity: 1; visibility: visible; }
      90.01%, 100% { opacity: 0; visibility: hidden; }
    }

    .log-line-1 {
      fill: #f87171;
      font-weight: 500;
      opacity: 0;
      animation: fade-in-line-1 10s infinite ease-out;
    }
    @keyframes fade-in-line-1 {
      0%, 34% { opacity: 0; }
      36%, 90% { opacity: 1; }
      90.01%, 100% { opacity: 0; }
    }

    .log-line-2 {
      fill: #38bdf8;
      font-weight: 500;
      opacity: 0;
      animation: fade-in-line-2 10s infinite ease-out;
    }
    @keyframes fade-in-line-2 {
      0%, 39% { opacity: 0; }
      41%, 90% { opacity: 1; }
      90.01%, 100% { opacity: 0; }
    }

    /* Phase 4: Big Branding typing "gericandmorty" */
    .brand-group {
      animation: stage-3 10s infinite step-end;
    }
    @keyframes stage-3 {
      0%, 45% { opacity: 0; visibility: hidden; }
      45.01%, 90% { opacity: 1; visibility: visible; }
      90.01%, 100% { opacity: 0; visibility: hidden; }
    }

    #rect-brand {
      font-family: 'Fira Code', monospace;
      font-size: 32px;
      width: 0ch;
      animation: type-brand 10s infinite linear;
    }
    @keyframes type-brand {
      0%, 45% { width: 0ch; }
      60%, 90% { width: 13ch; }
      90.01%, 100% { width: 0ch; }
    }

    .cursor-brand {
      font-family: 'Fira Code', monospace;
      font-size: 32px;
      animation: move-cursor-brand 10s infinite linear, blink 0.8s infinite;
    }
    @keyframes move-cursor-brand {
      0%, 45% { transform: translateX(0ch); opacity: 0; }
      45.01% { opacity: 1; transform: translateX(0ch); }
      60%, 90% { transform: translateX(13ch); opacity: 1; }
      90.01%, 100% { opacity: 0; }
    }

    .brand-text {
      font-family: 'Fira Code', monospace;
      font-size: 32px;
      font-weight: 700;
      fill: url(#brand-grad);
      filter: url(#neon-glow);
    }
  </style>


  <!-- Shadow backing for the window -->
  <rect x="15" y="15" width="770" height="420" rx="12" fill="rgba(0,0,0,0.5)" filter="blur(10px)" />

  <!-- Main Terminal Window Frame -->
  <rect x="10" y="10" width="780" height="430" class="term-window" />
  
  <!-- Window Header Bar -->
  <path d="M 10 22 Q 10 10 22 10 L 778 10 Q 790 10 790 22 L 790 45 L 10 45 Z" class="term-header" />
  
  <!-- Window Controls (Traffic Lights) -->
  <circle cx="30" cy="27" r="6" fill="#ff5f56" />
  <circle cx="50" cy="27" r="6" fill="#ffbd2e" />
  <circle cx="70" cy="27" r="6" fill="#27c93f" />
  
  <!-- Header Title -->
  <text x="400" y="32" text-anchor="middle" font-family="'Fira Code', monospace" font-size="13" fill="#64748b">bash — gericmorit@github:~</text>

  <!-- Grid Overlay on Terminal Body -->
  <rect x="11" y="46" width="778" height="393" class="grid-overlay" pointer-events="none" />

  <!-- Terminal Content Area -->
  <g transform="translate(25, 45)">
    
    <!-- Stage 1: The Prompt and Typing Command -->
    <g class="initial-prompt">
      <text x="35" y="80" class="text-base">
        <tspan class="prompt-user">gericmorit</tspan><tspan fill="#64748b">@</tspan><tspan class="prompt-host">github</tspan><tspan fill="#64748b">:</tspan><tspan fill="#818cf8">~</tspan><tspan class="prompt-char">$ </tspan>
      </text>
      
      <!-- Command text wrapped in clip path -->
      <g clip-path="url(#clip-cmd)">
        <text x="262" y="80" class="text-base">
          <tspan class="cmd-sudo">sudo </tspan><tspan class="cmd-rm">rm -rf </tspan><tspan class="cmd-dest">/</tspan>
        </text>
      </g>
      
      <!-- Cursor for command -->
      <g transform="translate(262, 63)">
        <rect width="10" height="20" class="cursor-cmd cursor-rect" />
      </g>
    </g>
    
    <!-- Stage 2: System Deletion Logs -->
    <g class="reboot-log">
      <text x="35" y="80" class="text-base log-line-1">
        [CRITICAL] ROOT DIRECTORY DELETED
      </text>
      <text x="35" y="115" class="text-base log-line-2">
        [SYSTEM] Initializing gericandmorty...
      </text>
    </g>
    
    <!-- Stage 3: Large Glowing Brand Typo -->
    <g class="brand-group">
      <!-- Icon chevron -->
      <text x="35" y="238" font-family="'Fira Code', monospace" font-size="32" font-weight="700" fill="#34d399" filter="url(#neon-glow)">&gt;</text>
      
      <g clip-path="url(#clip-brand)">
        <text x="75" y="238" class="brand-text">gericandmorty</text>
      </g>
      
      <!-- Cursor for brand -->
      <g transform="translate(75, 206)">
        <rect width="18" height="36" class="cursor-brand cursor-rect" />
      </g>
    </g>

  </g>
  
  <!-- Flash overlay for command execution screen glitch -->
  <rect x="11" y="46" width="778" height="393" class="flash-overlay" rx="0" pointer-events="none" />
</svg>
