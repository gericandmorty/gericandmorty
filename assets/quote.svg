<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect x="20" y="20" width="760" height="360" rx="15" fill="#0d1117" stroke="#30363d" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Header Bar -->
  <path d="M 20 35 Q 20 20 35 20 L 765 20 Q 780 20 780 35 L 780 70 L 20 70 Z" fill="url(#header_grad)" />
  
  <!-- Window Controls -->
  <circle cx="50" cy="45" r="8" fill="#ff5f56" />
  <circle cx="75" cy="45" r="8" fill="#ffbd2e" />
  <circle cx="100" cy="45" r="8" fill="#27c93f" />

  <!-- Tab -->
  <path d="M 130 25 L 290 25 L 305 70 L 115 70 Z" fill="#0d1117" />
  <text x="165" y="52" font-family="monospace" font-size="16" fill="#c9d1d9">Philosophy.ts</text>
  <circle cx="152" cy="46" r="4.5" fill="#3178c6" />

  <!-- Quote Section - JSDoc Style -->
  <g font-family="monospace" font-size="22" transform="translate(60, 120)">
    <text y="0" fill="#6272a4">/**</text>
    <text y="40" fill="#6272a4"> * <tspan fill="#bd93f9">"It is better to change an opinion than"</tspan></text>
    <text y="80" fill="#6272a4"> * <tspan fill="#bd93f9">"to persist in a wrong one."</tspan></text>
    <text y="120" fill="#6272a4"> * </text>
    <text y="160" fill="#6272a4"> * <tspan fill="#ff79c6">@author</tspan> <tspan fill="#f1fa8c">Socrates</tspan></text>
    <text y="200" fill="#6272a4"> */</text>
  </g>
</svg>
