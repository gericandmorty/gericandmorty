name: GitHub Stats Automation

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create stage directory
        run: mkdir -p stage

      # 3D Contribution Graph Generation
      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Move 3D SVG
        run: |
          mkdir -p stage
          if [ -d profile-3d-contrib ]; then cp profile-3d-contrib/*.svg stage/; fi

      # Snake Animation
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            stage/github-contribution-grid-snake.svg?color_dots=#161b22,#3b82f6,#0891b2,#d946ef,#facc15&color_snake=#ffffff
            stage/github-contribution-grid-snake-dark.svg?color_dots=#161b22,#3b82f6,#0891b2,#d946ef,#facc15&color_snake=#ffffff

      # Deploy to output branch
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./stage
          publish_branch: output
          commit_message: "Update profile stats [skip ci]"
